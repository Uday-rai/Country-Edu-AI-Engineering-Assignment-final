services:
  api:
    build: .
    ports:
      - "8010:8010"
    environment:
      DATABASE_URL: postgresql+psycopg2://support_user:support_pass@db:5432/support_assistant
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: support_assistant
      POSTGRES_USER: support_user
      POSTGRES_PASSWORD: support_pass
    ports:
      - "5433:5432"
    volumes:
      - support_db:/var/lib/postgresql/data

volumes:
  support_db:
