services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://resume_user:resume_pass@db:5432/resume_screening
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: resume_screening
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_pass
    ports:
      - "5432:5432"
    volumes:
      - resume_db:/var/lib/postgresql/data

volumes:
  resume_db:
